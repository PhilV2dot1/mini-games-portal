<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background square -->
  <rect width="100" height="100" fill="white"/>
  <!-- Full black outer circle -->
  <circle cx="50" cy="50" r="44" fill="black"/>
  <!-- Inner white circle (creates the donut/ring) -->
  <circle cx="50" cy="50" r="21" fill="white"/>
  <!-- Diagonal cut: thin white band from top-right to bottom-left -->
  <!-- The band runs at ~45 degrees. Width ~8px.
       Top-right corner clip: eliminates the top-right portion of the ring -->
  <polygon points="60,6 94,6 94,40" fill="white"/>
  <!-- Bottom-left corner clip: eliminates the bottom-left portion of the ring -->
  <polygon points="6,60 6,94 40,94" fill="white"/>
</svg>
