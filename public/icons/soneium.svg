<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="100" height="100" fill="white"/>
  <!-- Full black outer circle -->
  <circle cx="50" cy="50" r="44" fill="black"/>
  <!-- Inner white circle (donut hole) -->
  <circle cx="50" cy="50" r="21" fill="white"/>
  <!--
    Two thin diagonal white cuts — each ~5px wide — running from upper-right
    to lower-left at ~45°, one through the top arc of the ring and one
    through the bottom arc.
    Upper cut: top-right quadrant, from (56,6)→(94,44) along the outer edge
    Lower cut: bottom-left quadrant, from (6,56)→(44,94) along the outer edge
  -->
  <!-- Upper diagonal cut (top-right arc) -->
  <polygon points="53,6 58,6 94,42 94,47" fill="white"/>
  <!-- Lower diagonal cut (bottom-left arc) -->
  <polygon points="6,53 6,58 47,94 42,94" fill="white"/>
</svg>
